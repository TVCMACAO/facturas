{% macro render_field(field, class_name='form-control') %}
  <div class="form-group mb-3">
    {{ field.label(class="form-label") }}
    {{ field(class=class_name) }}
    {% if field.errors %}
      <div class="invalid-feedback d-block">
        {% for error in field.errors %}
          <span>{{ error }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </div>
{% endmacro %}
